syntax = "proto3";

package conversionreportservice;

service ReportGrpcService {
  rpc GetReport(GetReportRequest) returns (GetReportResponse);
}

message GetReportRequest {
  int64 request_id = 1;
}

message GetReportResponse {
  int64 request_id = 1;
  string status = 2;
  double conversion_ratio = 3;
  int32 payments_count = 4;
}
