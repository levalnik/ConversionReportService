syntax = "proto3";

package conversionreportservice.events;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "ConversionReportService.Infrastructure.Messaging.Contracts";

message ReportRequestedKey {
  int64 request_id = 1;
}

message ReportRequestedValue {
  int64 request_id = 1;
  int64 product_id = 2;
  int64 checkout_id = 3;

  google.protobuf.Timestamp from = 4;
  google.protobuf.Timestamp to = 5;

  google.protobuf.Timestamp created_at = 6;
}